<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Classroom AI V3</title>
  <link rel="stylesheet" href="/static/css/style.css?v=8">
</head>
<body>
  <div class="mobile-topbar">
    <button id="sidebar-toggle" class="mobile-menu-btn" type="button">Menu</button>
    <strong>Smart Classroom AI V3</strong>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">SC</div>
      <div>
        <h2>Smart Classroom</h2>
        <p>AI V3 Admin</p>
      </div>
    </div>

    <nav class="nav-menu">
      <a href="/" class="nav-link">
        <svg class="nav-ico" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
        <span>Dashboard</span>
      </a>

      <div class="nav-group">
        <div class="nav-title">Management</div>
        <a href="/students" class="nav-link child">
          <svg class="nav-ico" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path><circle cx="10" cy="7" r="4"></circle><path d="M21 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          <span>Students</span>
        </a>
        <a href="/sessions" class="nav-link child">
          <svg class="nav-ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path></svg>
          <span>Sessions</span>
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-title">Attendance</div>
        <a href="/attendance" class="nav-link child">
          <svg class="nav-ico" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          <span>Attendance</span>
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-title">AI Monitoring</div>
        <a href="/training" class="nav-link child">
          <svg class="nav-ico" viewBox="0 0 24 24"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"></path></svg>
          <span>AI Training</span>
        </a>
        <a href="/ai-monitoring" class="nav-link child">
          <svg class="nav-ico" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          <span>AI Monitoring</span>
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-title">System</div>
        <a href="/system-status" class="nav-link child">
          <svg class="nav-ico" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
          <span>System Status</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-note">
      <span>Demo Mode</span>
      <strong>Raspberry Pi Ready</strong>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    const currentPath = window.location.pathname.replace(/\/$/, "") || "/";
    document.querySelectorAll(".nav-link").forEach((link) => {
      const href = link.getAttribute("href").replace(/\/$/, "") || "/";
      if ((href === "/" && currentPath === "/") || (href !== "/" && currentPath.startsWith(href))) {
        link.classList.add("active");
      }
    });

    const toggle = document.getElementById("sidebar-toggle");
    if (toggle) {
      toggle.addEventListener("click", () => {
        document.body.classList.toggle("sidebar-open");
      });
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
